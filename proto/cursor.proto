  message PerformanceEventsConfig {
    bool enabled = 1;
    optional int32 buffer_size = 2;
    optional int32 flush_interval_ms = 3;
  }

  message PlanChoice {
    string label = 1;
    optional string sublabel = 2;
    optional string description = 3;
    string value = 4;
  }

  message ProfileConfig {
    string id = 1;
    optional AiserverV1.HeapProfileConfig heap = 2;
    optional AiserverV1.CpuProfileConfig cpu = 3;
  }

  message ProfileScheduleConfig {
    message ScheduleConfig {
      int32 interval = 1;
      int32 duration = 2;
    }

    string id = 1;
    string process = 2;
    string config_id = 3;
    AiserverV1.ProfileScheduleConfig.ScheduleConfig schedule = 4;
    int32 activity_timeout = 5;
  }

  message ProfilingConfig {
    bool enabled = 1;
    repeated AiserverV1.ProfileConfig configs = 2;
    repeated AiserverV1.ProfileScheduleConfig schedules = 3;
  }

  message ReloadWindowAction {
  }

  message RemoteAuthority {
    AiserverV1.RemoteConnectionType connection_type = 1;
  }

  message RunTerminalServerConfig {
    repeated string composite_shell_commands = 1;
    repeated string safe_shell_commands = 2;
  }

  message ScmConnectAdContext {
    AiserverV1.ScmConnectAdProvider provider = 1;
    string remote_url = 2;
    AiserverV1.ScmConnectAdConnectionState connection_state = 3;
  }

  message SwitchModelAction {
    optional string suggested_model = 1;
  }

  message TerminalTipConfig {
    string message_ = 1;
    bool enabled = 2;
  }

  message TraceConfig {
    bool enabled = 1;
    optional int32 buffer_size = 2;
    optional int32 flush_interval_ms = 3;
    optional double sample_rate = 4;
  }

  message UpdateConfig {
    enum UpdateMode {
      UPDATE_MODE_UNSPECIFIED = 0;
      UPDATE_MODE_ONE_TIME = 1;
    }

    string release_track = 1;
    AiserverV1.UpdateConfig.UpdateMode mode = 2;
    optional int32 applied_at = 3;
  }

  message UpgradeAction {
    string membership_to_upgrade_to = 1;
    optional bool try_immediate_upgrade = 2;
    optional bool allow_trial = 3;
  }

  message UpgradeChoice {
  }

  message UrlAction {
    string url = 1;
  }

  message VscodeCPUProperties {
    string model = 1;
    double speed = 2;
  }

  message VscodeOSProperties {
    string type = 1;
    string release = 2;
    string arch = 3;
    string platform = 4;
    repeated AiserverV1.VscodeCPUProperties cpus = 5;
  }

  message VscodeOSStatistics {
    double totalmem = 1;
    double freemem = 2;
    repeated double loadavg = 3;
  }

}
