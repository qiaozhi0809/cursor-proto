// EditFileV2Params - for write operations with long content
message EditFileV2Params {
  string relative_workspace_path = 1;
  string contents_after_edit = 2;
  bool waiting_for_file_contents = 3;
  string streaming_content = 9;
}

// RunTerminalCommandV2Params - for terminal commands
message RunTerminalCommandV2Params {
  string command = 1;
  string cwd = 2;
  bool is_background = 3;
}

// ListDirV2Params - for directory listing
message ListDirV2Params {
  string directory_path = 1;
}

// ReadFileV2Params - for reading files
message ReadFileV2Params {
  string relative_workspace_path = 1;
  int32 start_line_one_indexed = 2;
  int32 end_line_one_indexed_inclusive = 3;
}

// Tool call from server - see TASK-26-tool-schemas.md ClientSideToolV2Call
message ClientSideToolV2Call {
  ClientSideToolV2 tool = 1;
  string tool_call_id = 3;
  string name = 9;
  string raw_args = 10;
  
  // Typed params - these contain complete data when raw_args is truncated
  EditFileV2Params edit_file_v2_params = 50;
  ListDirV2Params list_dir_v2_params = 52;
  ReadFileV2Params read_file_v2_params = 53;
  RunTerminalCommandV2Params run_terminal_command_v2_params = 23;
}

// Tool result sent back to server - see TASK-26-tool-schemas.md ClientSideToolV2Result
message ClientSideToolV2Result {
  ClientSideToolV2 tool = 1;
  string tool_call_id = 35;
  // result oneof - we'll encode specific results inline
}

message MessageSummary {
  string content = 1;
  string summaryId1 = 2; 
  string summaryId2 = 3; // uuid, equal to summaryId1
  string previousSummaryId = 4; 
}

message MessageThinking {
  string content = 1;
}
message StreamUnifiedChatWithToolsRequest {
  message Request {
    message Message {
      message Image {
        message Metadata {
          int32 width = 1;
          int32 height = 2;
        }
        bytes data = 1;
        Metadata metadata = 2;
      }
      string content = 1;
      int32 role = 2;
      Image image = 10;
      string messageId = 13;
      string unknown29 = 29; // 1, only for user message
      string summaryId = 32;
      MessageSummary summary = 39;
      MessageThinking thinking = 45;
      int32 chatModeEnum = 47; // 1 for ask, 2 for agent, 3 for edit
    }
    message Instruction {
      string instruction = 1;
    }
    message Model {
      string name = 1;
      bytes empty = 4;
    }
    message CursorSetting {
      message Unknown6 {
        bytes unknown1 = 1;
        bytes unknown2 = 2;
      }
      string name = 1;
      bytes unknown3 = 3;
      Unknown6 unknown6 = 6;
      int32 unknown8 = 8;
      int32 unknown9 = 9;
    }
    message Metadata {
      string os = 1; // win32
      string arch = 2; // x64
      string version = 3; // 10.0.22631
      string path = 4; // C:\Program Files\PowerShell\7\pwsh.exe
      string timestamp = 5; // 2025-03-03T13:10:08.590Z
    }
    message MessageId {
      string messageId = 1;
      string summaryId = 2;
      int32 role = 3;
    }

    repeated Message messages = 1;
    int32 unknown2 = 2; // 1
    Instruction instruction = 3;
    int32 unknown4 = 4; // 1
    Model model = 5;
    repeated string wikiTool = 7; // one url one item
    string webTool = 8; // "full search"
    int32 unknown13 = 13;
    CursorSetting cursorSetting = 15;
    int32 unknown19 = 19; // 1
    int32 unknown22 = 22; // 1
    string conversationId = 23; // uuid
    Metadata metadata = 26;
    bool isAgentic = 27; // true for agent mode - see TASK-7-protobuf-schemas.md
    repeated ClientSideToolV2 supportedTools = 29; // Agent mode tools - see TASK-7
    repeated MessageId messageIds = 30;
    int32 largeContext = 35; // 1
    int32 unknown38 = 38; // 0
  }
  
  Request request = 1;
}

// StreamUnifiedChatResponse - see TASK-7-protobuf-schemas.md
// Main response message from StreamUnifiedChatWithTools
message StreamUnifiedChatWithToolsResponse {
  // Legacy text field - may not be used anymore
  string text = 1;
  
  // Server bubble ID
  string server_bubble_id = 22;
  
  // Message content - field 2 is now a nested message, not a string
  message Message {
    string content = 1;
  }
  Message message = 2;
  
  int32 debugging_only_token_count = 3;
  
  // Thinking/reasoning - field 25
  message Thinking {
    string content = 1;
  }
  Thinking thinking = 25;
  
  // Tool calls - see TASK-26-tool-schemas.md
  // tool_call_v2 at field 36
  message ToolCallV2 {
    ClientSideToolV2 tool = 1;
    string tool_call_id = 3;
    string name = 9;
    string raw_args = 10;
  }
  ToolCallV2 tool_call_v2 = 36;
  
  // Legacy tool call at field 13
  message ToolCallV1 {
    string tool_call_id = 1;
    string name = 2;
    string arguments = 3;
  }
  ToolCallV1 tool_call = 13;
}
