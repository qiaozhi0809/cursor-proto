name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Install CGO deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libsqlite3-dev

      - name: gofmt
        run: |
          diff="$(gofmt -l .)"
          if [ -n "$diff" ]; then
            echo "::error::gofmt reported diffs:"
            echo "$diff"
            exit 1
          fi

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...
